# https://ego1065.github.io/omok/  (저장소 Settings → Pages에서 소스: GitHub Actions)
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Pages 배포는 겹치면 꼬이기 쉬워 마지막 실행만 남기지 않고 순차 완료를 우선합니다.
concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (Vite → dist)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Upload static files as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
